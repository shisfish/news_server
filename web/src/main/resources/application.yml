# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 9000
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    threads:
      # tomcat最大线程数，默认为200
      max: 200
      # Tomcat启动初始化的线程数，默认值25
      min-spare: 25
spring:
  messages:
    # 国际化资源文 件路径
    basename: i18n/messages
  profiles:
    active: local-mysql
  config:
    additional-location: classpath:/config/devMysql/application-mysql.yml
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 100MB
      # 设置总上传的文件大小
      max-request-size: 200MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  cache:
    type: ehcache
    ehcache:
      config: classpath:ehcache.xml
  #    default-property-inclusion: non_null   # 处理 jackson 返回的null值 不显示出来 只显示不为null的
